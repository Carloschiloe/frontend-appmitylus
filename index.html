<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mitynex Prime</title>
  <meta name="description" content="Mitynex — Plataforma integral para la gestión de choritos.">
  <link rel="icon" type="image/png" href="img/favicon.png">
</head>
<body>
  <div id="root">
    <!-- Loader de arranque: React lo destruye al montar -->
    <div id="app-loader" class="am-flex-center" style="height: 100vh; flex-direction: column; gap: 20px;">
      <div class="mx-loader"></div>
      <p style="color: #64748b; font-family: sans-serif; font-size: 14px;">Iniciando Mitynex Prime...</p>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
  
  <style>
    .am-flex-center { display: flex; align-items: center; justify-content: center; }
    .mx-loader {
      width: 48px;
      height: 48px;
      border: 5px solid #00a8a8;
      border-bottom-color: transparent;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
