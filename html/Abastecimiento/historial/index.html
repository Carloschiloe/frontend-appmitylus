<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial — Mitynex</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/index-modern.css">
  <link rel="stylesheet" href="/css/base-ui.css">
  <link rel="stylesheet" href="/css/mitynex-brand.css">
  <link rel="stylesheet" href="/css/historial.css">
  <script src="/js/auth.js"></script>
</head>
<body class="app-modern-v2">
  <div class="layout">
    <div id="sidebar-container"></div>

    <main class="content hist-main-shell">
      <div class="hst-page mx-page-frame mx-page-stack">

        <!-- Vista 1: Buscador y lista de proveedores -->
        <div id="viewSearch" class="mx-page-stack">
          <header class="mx-hero">
            <div class="mx-hero-content">
              <h1><i class="bi bi-journal-richtext"></i> Historial</h1>
              <p>Expediente de trazabilidad por proveedor: desde el primer contacto hasta la última compra.</p>
            </div>
          </header>

          <div class="mx-table-card am-mt-12">
            <div class="mx-table-card-head">
              <div class="mx-field mx-mb-0" style="flex:1; max-width: 400px;">
                <div class="hst-search-box">
                  <i class="bi bi-search"></i>
                  <input id="histSearch" type="text" placeholder="Buscar proveedor..." autocomplete="off">
                </div>
              </div>
              <div class="mx-hero-actions">
                <div class="mx-badge-group">
                  <button class="mx-badge mx-badge-muted hst-chip active" data-status="todos" type="button">Todos</button>
                  <button class="mx-badge mx-badge-success hst-chip" data-status="activo" type="button">Activos</button>
                  <button class="mx-badge mx-badge-warning hst-chip" data-status="riesgo" type="button">En riesgo</button>
                  <button class="mx-badge mx-badge-danger hst-chip" data-status="inactivo" type="button">Inactivos</button>
                </div>
                <div class="hst-view-toggle">
                  <button class="hst-vt-btn active" id="btnViewGrid" title="Vista tarjetas" type="button"><i class="bi bi-grid-3x3-gap"></i></button>
                  <button class="hst-vt-btn" id="btnViewList" title="Vista lista" type="button"><i class="bi bi-list-ul"></i></button>
                </div>
              </div>
            </div>

            <div class="mx-p-24">
              <div id="histProvGrid" class="hst-provider-grid">
                <p class="hst-loading">Cargando proveedores...</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Vista 2: Expediente detallado -->
        <div id="viewExpediente">

          <header class="exp-header">
            <button id="btnBack" class="exp-back" type="button">
              <i class="bi bi-arrow-left"></i> Volver
            </button>
            <div class="exp-title">
              <h2 id="expProvName">—</h2>
              <p id="expProvSub">Expediente de trazabilidad</p>
            </div>
            <div class="exp-actions">
              <button id="btnExport" class="exp-btn-export write-only" type="button">
                <i class="bi bi-printer"></i> Exportar
              </button>
            </div>
          </header>

          <div id="expMetaBar" class="exp-meta-bar"></div>

          <div class="exp-summary">
            <div class="exp-kpi">
              <div id="kpiTotal" class="exp-kpi-val">—</div>
              <div class="exp-kpi-lbl">Total eventos</div>
            </div>
            <div class="exp-kpi">
              <div id="kpiVisitas" class="exp-kpi-val">—</div>
              <div class="exp-kpi-lbl">Visitas</div>
            </div>
            <div class="exp-kpi">
              <div id="kpiInteracciones" class="exp-kpi-val">—</div>
              <div class="exp-kpi-lbl">Interacciones</div>
            </div>
            <div class="exp-kpi">
              <div id="kpiTratos" class="exp-kpi-val">—</div>
              <div class="exp-kpi-lbl">Tratos</div>
            </div>
            <div class="exp-kpi">
              <div id="kpiCompras" class="exp-kpi-val">—</div>
              <div class="exp-kpi-lbl">Compras</div>
            </div>
            <div id="expAlerts" class="exp-alerts"></div>
          </div>

          <div class="exp-filters">
            <span>Filtrar:</span>
            <button class="exp-chip active" data-filter="todos" type="button">Todos</button>
            <button class="exp-chip" data-filter="registro" type="button">
              <span class="chip-dot" style="background:#0d9488"></span>Registro
            </button>
            <button class="exp-chip" data-filter="interaccion" type="button">
              <span class="chip-dot" style="background:#3b82f6"></span>Interacciones
            </button>
            <button class="exp-chip" data-filter="visita" type="button">
              <span class="chip-dot" style="background:#8b5cf6"></span>Visitas
            </button>
            <button class="exp-chip" data-filter="trato" type="button">
              <span class="chip-dot" style="background:#f59e0b"></span>Tratos
            </button>
            <button class="exp-chip" data-filter="compra" type="button">
              <span class="chip-dot" style="background:#059669"></span>Compras
            </button>
            <button class="exp-chip" data-filter="muestreo" type="button">
              <span class="chip-dot" style="background:#06b6d4"></span>Muestreos
            </button>
          </div>

          <div class="exp-timeline-wrap">
            <div id="expTimeline" class="exp-timeline">
              <p class="exp-empty">Cargando...</p>
            </div>
          </div>

        </div>

      </div>
    </main>
  </div>

  <div id="lbOverlay" role="dialog" aria-modal="true" aria-label="Visor de fotos">
    <div class="lb-inner">
      <button class="lb-close" id="lbClose" type="button" aria-label="Cerrar">
        <i class="bi bi-x-lg"></i>
      </button>
      <img id="lbImg" src="" alt="Foto de visita">
      <div class="lb-controls">
        <button class="lb-btn" id="lbPrev" type="button"><i class="bi bi-chevron-left"></i></button>
        <span id="lbCount">1 / 1</span>
        <button class="lb-btn" id="lbNext" type="button"><i class="bi bi-chevron-right"></i></button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/abastecimiento/historial/index.js"></script>
  <script type="module" src="/js/components/Sidebar.js"></script>
</body>
</html>
