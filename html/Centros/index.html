<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mitylus · Directorio de Centros</title>

  <!-- Tipografía & Iconos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>

  <!-- Tailwind 4 Core -->
  <link rel="stylesheet" href="/spa-mmpp/index.css" />
</head>
<body class="mmpp-layout bg-slate-50 min-h-screen">

  <!-- Sidebar Mount -->
  <div id="mmppNavMount"></div>

  <!-- Contenido Principal -->
  <main class="mmpp-main flex-1 flex flex-col">
    
    <!-- Header -->
    <header class="flex items-center justify-between mb-8 px-4">
      <div>
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Directorio de Centros</h2>
        <p class="text-slate-500 mt-1 text-lg text-indigo-600/80 font-medium">Gestión geográfica de cultivos mitílidos</p>
      </div>
      <div class="flex gap-3">
        <button id="btnRefresh" class="p-2 text-slate-400 hover:text-brand-600 transition-colors">
          <i class="material-icons">refresh</i>
        </button>
      </div>
    </header>

    <!-- KPI Grid -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-6 px-4 mb-8">
      <div class="p-6 rounded-2xl bg-white border border-slate-200 shadow-sm">
        <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Total Centros</div>
        <div class="flex items-end gap-2">
          <span id="kpi-centros" class="text-3xl font-extrabold text-slate-900">--</span>
          <span class="text-emerald-500 text-xs font-bold mb-1 flex items-center"><i class="material-icons text-xs">trending_up</i> Región X</span>
        </div>
      </div>
      <div class="p-6 rounded-2xl bg-white border border-slate-200 shadow-sm">
        <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Hectáreas Totales</div>
        <div class="flex items-end gap-2">
          <span id="kpi-has" class="text-3xl font-extrabold text-slate-900">--</span>
          <span class="text-slate-400 text-xs font-bold mb-1 lowercase">has</span>
        </div>
      </div>
      <div class="p-6 rounded-2xl bg-white border border-slate-200 shadow-sm">
        <div class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Comunas Cubiertas</div>
        <div id="kpi-comunas" class="text-3xl font-extrabold text-slate-900">--</div>
      </div>
    </section>

    <!-- Main Content Tabs Container -->
    <div class="flex-1 px-4 flex flex-col gap-6">
      
      <!-- Tabs Navigation -->
      <div class="flex border-b border-slate-200">
        <button class="px-6 py-3 border-b-2 border-brand-600 text-brand-600 font-bold text-sm">Directorio</button>
        <button class="px-6 py-3 border-b-2 border-transparent text-slate-400 font-medium text-sm hover:text-slate-600 transition-colors">Mapa de Concesiones</button>
      </div>

      <!-- Table Container -->
      <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex-1 flex flex-col">
        <div id="loading-overlay" class="p-12 text-center text-slate-400 flex flex-col items-center gap-4 animate-pulse">
            <i class="material-icons text-4xl">sync</i>
            <span class="font-medium">Cargando datos maestros...</span>
        </div>
        <div id="table-mount" class="hidden flex-1 overflow-auto">
          <!-- La tabla real se inyecta aquí desde el JS original -->
        </div>
      </div>

    </div>

  </main>

  <!-- React & Sidebar -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script type="module" src="/spa-mmpp/nav.jsx"></script>

  <!-- JS dependencias del módulo original -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script type="module" src="./centros-logic.js?v=2"></script>
</body>
</html>
