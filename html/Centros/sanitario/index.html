<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Estado Sanitario — AppMMPP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/index-modern.css">
  <link rel="stylesheet" href="/css/base-ui.css">
  <link rel="stylesheet" href="/css/sanitario.css">
  <script src="/js/auth.js"></script>
</head>
<body>
<div class="layout">
  <div id="sidebar-container"></div>
  <main class="content">
    <!-- Banner de alerta sticky -->
    <div id="sanAlertBanner" class="hidden">
      <span class="san-banner-icon">🚨</span>
      <span>Alertas sanitarias activas en Los Lagos:</span>
      <span class="san-banner-areas" id="sanBannerAreas">—</span>
    </div>

    <div class="san-wrap">
      <!-- Hero -->
      <div class="san-hero">
        <h1>
          <span id="sanGlobalDot" class="san-dot gris" style="width:14px;height:14px;"></span>
          Estado Sanitario — Región de Los Lagos
        </h1>
        <div class="san-hero-actions">
          <span class="san-sync-info" id="sanSyncInfo">Sin sincronización</span>
          <button class="am-btn am-btn-flat" id="btnSanSync" type="button">
            <i class="bi bi-arrow-clockwise"></i> Actualizar mrSAT
          </button>
        </div>
      </div>

      <div class="san-filter-section">
        <div class="san-filter-title">Estado sanitario</div>
        <div class="san-kpis san-kpis-compact">
          <div class="san-kpi verde" data-filter="ok"><div class="kpi-num" id="kpiOk">-</div><div class="kpi-label">OK</div></div>
          <div class="san-kpi naranja" data-filter="alerta"><div class="kpi-num" id="kpiAlerta">-</div><div class="kpi-label">Con alerta</div></div>
          <div class="san-kpi rojo" data-filter="bloqueada"><div class="kpi-num" id="kpiBloqueada">-</div><div class="kpi-label">Bloqueada</div></div>
        </div>
      </div>

      <div class="san-filter-section">
        <div class="san-filter-title">Estado area Sernapesca</div>
        <div class="san-state-filters" id="sanAreaFilters">
          <button type="button" class="san-state-chip is-active" data-area-filter="">Todas</button>
          <button type="button" class="san-state-chip" data-area-filter="abierta">Abiertas</button>
          <button type="button" class="san-state-chip" data-area-filter="cerrada">Cerradas</button>
          <button type="button" class="san-state-chip" data-area-filter="inactiva">Inactivas</button>
          <button type="button" class="san-state-chip" data-area-filter="eliminada">Eliminadas</button>
        </div>
      </div>

      <!-- Tab: Áreas PSMB -->
      <div id="sanTabAreas">
      <div class="san-toolbar">
        <div class="san-search">
          <i class="bi bi-search"></i>
          <input id="sanSearchInput" type="search" placeholder="Buscar por codigo de area, area PSMB, centro, codigo de centro, comuna..." autocomplete="off" />
        </div>
        <div class="san-toolbar-actions">
          <button type="button" class="am-btn am-btn-flat san-clear-filter" id="sanClearFilter">Mostrar todas</button>
          <div class="san-search-meta" id="sanSearchMeta">-</div>
        </div>
      </div>
        <div class="san-table-wrap">
          <table class="san-table">
            <thead>
              <tr>
                <th style="width:138px;">Estado sanitario</th>
                <th style="width:76px;">Cód. Área</th>
                <th style="width:auto;">Área PSMB</th>
                <th style="width:108px;">Estado area</th>
                <th style="width:60px;">Centros</th>
                <th style="width:76px;">Alertas</th>
                <th style="width:80px;">Tipos análisis</th>
                <th style="width:82px;">Fecha</th>
                <th style="width:58px;"></th>
              </tr>
            </thead>
            <tbody id="sanAreasBody">
              <tr><td colspan="9" class="muted">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>


    </div><!-- san-wrap -->
  </main>
</div>

<!-- Modal historial área -->
<div id="modalSanHistorial" class="modal app-modal-modern" style="max-width:640px;width:96vw;display:none;">
  <div class="app-modal-header" style="padding:18px 24px 14px;border-bottom:1px solid #e2e8f0;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <h5 id="sanHistTitulo" style="margin:0;font-size:16px;font-weight:700;color:#0f172a;">Historial Área —</h5>
      <button type="button" id="btnSanHistClose" style="background:none;border:none;font-size:20px;cursor:pointer;color:#64748b;">×</button>
    </div>
  </div>
  <div class="app-modal-body" style="padding:0;max-height:60vh;overflow-y:auto;">
    <div id="sanHistBody" style="padding:0 4px;"></div>
  </div>
</div>

<script type="module" src="/js/centros/sanitario/index.js"></script>
</body>
</html>
