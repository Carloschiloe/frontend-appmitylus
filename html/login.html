<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión — AppMMPP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .login-brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }

    .login-brand-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.2;
    }

    .login-brand-text p {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 28px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .field label {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field-wrap {
      position: relative;
    }

    .field-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 15px;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      height: 44px;
      padding: 0 12px 0 38px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15,118,110,0.25);
    }

    .field input.error { border-color: #ef4444; }

    #togglePassword {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      pointer-events: all;
    }

    #togglePassword:hover { color: #94a3b8; }

    .btn-login {
      width: 100%;
      height: 44px;
      margin-top: 8px;
      background: #0f766e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .btn-login:hover:not(:disabled) { background: #0d9488; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-bar {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,0.1);
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 14px;
      font-size: 13px;
      color: #fca5a5;
    }

    .error-bar.show { display: flex; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-mark">AM</div>
      <div class="login-brand-text">
        <h1>Abastecimiento MMPP</h1>
        <p>Control operativo</p>
      </div>
    </div>

    <h2 class="login-title">Bienvenido</h2>
    <p class="login-sub">Ingresa tus credenciales para continuar</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <div class="field-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" id="email" name="email" autocomplete="email"
                 placeholder="usuario@empresa.com" required />
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="field-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" id="password" name="password" autocomplete="current-password"
                 placeholder="••••••••" required />
          <button type="button" id="togglePassword" aria-label="Mostrar contraseña">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <div class="spinner"></div>
        <span class="btn-label">Ingresar</span>
      </button>

      <div class="error-bar" id="errorBar">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span id="errorMsg">Error de autenticación</span>
      </div>
    </form>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
