<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión — AppMMPP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #0f766e;
      --teal-light: #14b8a6;
      --teal-glow: rgba(20, 184, 166, 0.35);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #060d1a;
      overflow: hidden;
    }

    /* ── Fondo animado ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(15,118,110,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(79,70,229,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 60% 10%, rgba(20,184,166,0.08) 0%, transparent 50%),
        #060d1a;
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      50%  { filter: hue-rotate(8deg) brightness(1.05); }
      100% { filter: hue-rotate(-5deg) brightness(0.95); }
    }

    /* Orbes flotantes */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: float linear infinite;
      opacity: 0;
    }
    .orb-1 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(15,118,110,0.22), transparent 70%);
      top: -100px; left: -80px;
      animation-duration: 18s; animation-delay: 0s;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(79,70,229,0.15), transparent 70%);
      bottom: -80px; right: -60px;
      animation-duration: 22s; animation-delay: -6s;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(20,184,166,0.12), transparent 70%);
      top: 50%; right: 15%;
      animation-duration: 15s; animation-delay: -3s;
    }

    @keyframes float {
      0%   { transform: translate(0, 0) scale(1);    opacity: 0.6; }
      25%  { transform: translate(30px, -40px) scale(1.05); opacity: 0.8; }
      50%  { transform: translate(-20px, 30px) scale(0.97); opacity: 0.5; }
      75%  { transform: translate(40px, 20px) scale(1.03); opacity: 0.7; }
      100% { transform: translate(0, 0) scale(1);    opacity: 0.6; }
    }

    /* Partículas */
    .particles { position: absolute; inset: 0; }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: var(--teal-light);
      border-radius: 50%;
      animation: particleDrift linear infinite;
      opacity: 0;
    }
    @keyframes particleDrift {
      0%   { transform: translateY(100vh) translateX(0);   opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }

    /* Grid lines */
    .grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(20,184,166,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20,184,166,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridFade 8s ease-in-out infinite alternate;
    }
    @keyframes gridFade {
      0% { opacity: 0.4; }
      100% { opacity: 0.9; }
    }

    /* ── Card ── */
    .login-card {
      position: relative;
      z-index: 10;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(51, 65, 85, 0.6);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow:
        0 0 0 1px rgba(20,184,166,0.06),
        0 30px 60px rgba(0,0,0,0.5),
        0 0 80px rgba(15,118,110,0.08) inset;
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Borde animado superior */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--teal-light), transparent);
      animation: topLine 3s ease-in-out infinite alternate;
    }
    @keyframes topLine {
      0%   { left: 20%; right: 20%; opacity: 0.4; }
      100% { left: 5%;  right: 5%;  opacity: 1; }
    }

    /* ── Brand ── */
    .login-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.15s both;
    }

    .login-brand-mark {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0f766e, #14b8a6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 20px var(--teal-glow);
      animation: logoPulse 4s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 20px var(--teal-glow); }
      50%       { box-shadow: 0 0 35px rgba(20,184,166,0.55); }
    }

    .login-brand-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.2;
    }
    .login-brand-text p {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 6px;
      animation: fadeUp 0.6s 0.2s both;
    }
    .login-sub {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 30px;
      animation: fadeUp 0.6s 0.25s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Campos ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 18px;
      animation: fadeUp 0.6s both;
    }
    .field:nth-child(1) { animation-delay: 0.3s; }
    .field:nth-child(2) { animation-delay: 0.38s; }

    .field label {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .field-wrap {
      position: relative;
    }

    .field-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      font-size: 15px;
      pointer-events: none;
      transition: color 0.2s;
      z-index: 1;
    }

    .field input {
      width: 100%;
      height: 46px;
      padding: 0 42px 0 40px;
      border: 1px solid rgba(51,65,85,0.8);
      border-radius: 10px;
      background: rgba(8, 15, 30, 0.6);
      color: #f1f5f9;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field input::placeholder { color: #334155; }

    .field input:focus {
      border-color: var(--teal);
      background: rgba(8, 15, 30, 0.85);
      box-shadow: 0 0 0 3px rgba(15,118,110,0.2), 0 0 20px rgba(15,118,110,0.08);
    }
    .field input:focus + .focus-ring,
    .field-wrap:focus-within .field-icon { color: var(--teal-light); }

    .field input.has-error { border-color: #ef4444; }

    /* Ojo — correctamente posicionado dentro del field-wrap */
    .toggle-eye {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 15px;
      transition: color 0.2s;
      border-radius: 0 10px 10px 0;
      z-index: 2;
    }
    .toggle-eye:hover { color: #94a3b8; }

    /* ── Botón ── */
    .btn-login {
      width: 100%;
      height: 46px;
      margin-top: 6px;
      background: linear-gradient(135deg, #0f766e, #0d9488);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s 0.45s both;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.12) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0s;
    }
    .btn-login:hover::after {
      transform: translateX(100%);
      transition: transform 0.5s ease;
    }
    .btn-login:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(15,118,110,0.45);
      transform: translateY(-1px);
    }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .btn-login.loading .spinner  { display: block; }
    .btn-login.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error bar ── */
    .error-bar {
      display: none;
      align-items: center;
      gap: 9px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 10px;
      padding: 11px 14px;
      margin-top: 16px;
      font-size: 13px;
      color: #fca5a5;
      animation: shakeIn 0.4s both;
    }
    .error-bar.show { display: flex; }
    @keyframes shakeIn {
      0%  { transform: translateX(-6px); opacity: 0; }
      30% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      100%{ transform: translateX(0);   opacity: 1; }
    }

    /* ── Footer ── */
    .login-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 11px;
      color: #334155;
      animation: fadeUp 0.6s 0.5s both;
    }
  </style>
</head>
<body>

  <!-- Fondo animado -->
  <div class="bg">
    <div class="bg-gradient"></div>
    <div class="grid-lines"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="particles" id="particles"></div>
  </div>

  <!-- Card -->
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-mark">AM</div>
      <div class="login-brand-text">
        <h1>Abastecimiento MMPP</h1>
        <p>Control operativo</p>
      </div>
    </div>

    <h2 class="login-title">Bienvenido</h2>
    <p class="login-sub">Ingresa tus credenciales para continuar</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <div class="field-wrap">
          <i class="bi bi-envelope field-icon"></i>
          <input type="email" id="email" name="email"
                 autocomplete="email" placeholder="usuario@empresa.com" required />
        </div>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="field-wrap">
          <i class="bi bi-lock field-icon"></i>
          <input type="password" id="password" name="password"
                 autocomplete="current-password" placeholder="••••••••" required />
          <button type="button" class="toggle-eye" id="togglePassword" aria-label="Mostrar contraseña">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <div class="spinner"></div>
        <span class="btn-label">Ingresar</span>
      </button>

      <div class="error-bar" id="errorBar">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span id="errorMsg">Error de autenticación</span>
      </div>
    </form>

    <p class="login-footer">Abastecimiento MMPP · Sistema interno</p>
  </div>

  <script>
    // Generar partículas
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${Math.random() > 0.6 ? 3 : 2}px;
        height: ${Math.random() > 0.6 ? 3 : 2}px;
        animation-duration: ${10 + Math.random() * 18}s;
        animation-delay: ${-Math.random() * 20}s;
        opacity: ${0.3 + Math.random() * 0.5};
      `;
      container.appendChild(p);
    }
  </script>
  <script src="/js/login.js"></script>
</body>
</html>
