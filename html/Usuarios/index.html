<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Usuarios — Mitynex</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/index-modern.css">
  <link rel="stylesheet" href="/css/base-ui.css">
  <link rel="stylesheet" href="/css/mitynex-brand.css">
  <link rel="stylesheet" href="/css/maestros.css">
  <script src="/js/auth.js"></script>
  <style>
    .usr-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .usr-badge-admin   { background: rgba(99,102,241,.15); color: #818cf8; }
    .usr-badge-usuario { background: rgba(20,184,166,.13); color: #2dd4bf; }
    .usr-badge-lectura { background: rgba(100,116,139,.15); color: #94a3b8; }
    .usr-badge-activo  { background: rgba(34,197,94,.12);  color: #4ade80; }
    .usr-badge-inactivo{ background: rgba(239,68,68,.12);  color: #f87171; }
    .usr-initials {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg,#0f766e,#14b8a6);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .usr-name-cell { display: flex; align-items: center; gap: 10px; }
    .usr-name-cell .usr-name  { font-weight: 600; color: var(--text-primary, #f1f5f9); font-size: 13px; }
    .usr-name-cell .usr-email { font-size: 11px; color: var(--text-muted, #64748b); }
    .usr-empty {
      text-align: center; padding: 48px 0; color: #475569;
    }
    .usr-empty i { font-size: 40px; display: block; margin-bottom: 10px; }
  </style>
</head>
<body class="app-modern-v2">
  <div class="layout">
    <div id="sidebar-container"></div>
    <main class="content">
      <div class="maest-shell">

        <header class="mx-hero">
          <div class="mx-hero-content">
            <h1><i class="bi bi-people"></i> Usuarios</h1>
            <p>Gestiona los usuarios del sistema. Solo los administradores pueden crear y modificar usuarios.</p>
          </div>
          <div class="mx-hero-actions">
            <button class="mx-btn mx-btn-primary write-only" id="btnNuevoUsuario">
              <i class="bi bi-person-plus"></i> Nuevo usuario
            </button>
          </div>
        </header>

        <div class="mx-table-card am-mt-24">
          <div class="mx-table-card-head">
            <h6 id="usr-count">Directorio de Usuarios</h6>
          </div>
          <div class="mx-p-12">
            <table class="mx-table" id="tbl-usuarios">
              <thead>
                <tr>
                  <th>Usuario</th>
                  <th>Rol</th>
                  <th>Estado</th>
                  <th>Último acceso</th>
                  <th style="text-align:right;">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbody-usuarios">
                <tr><td colspan="5" class="usr-empty"><i class="bi bi-hourglass-split"></i> Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Modal Usuario (Unificado) -->
  <div id="modalUsuario" class="mx-modal-overlay" style="display:none;">
    <div class="mx-modal" style="max-width: 480px;">
      <div class="mx-modal-head">
        <h3 id="modalUsuarioTitle">Nuevo usuario</h3>
        <button type="button" class="mx-btn mx-btn-flat js-usr-close">&times;</button>
      </div>
      <div class="mx-modal-body">
        <form id="formUsuario" class="mx-form-stack">
          <div class="mx-field">
            <label class="mx-label">Nombre completo <span style="color:#ef4444;">*</span></label>
            <input id="u-nombre" type="text" class="mx-input" placeholder="Ej: María González" autocomplete="off" required>
          </div>

          <div class="mx-field" id="u-email-row">
            <label class="mx-label">Correo electrónico <span style="color:#ef4444;">*</span></label>
            <input id="u-email" type="email" class="mx-input" placeholder="usuario@empresa.com" autocomplete="off" required>
          </div>

          <div class="mx-field" id="u-password-row">
            <label class="mx-label">Contraseña <span style="color:#ef4444;">*</span></label>
            <div style="position:relative;">
              <input id="u-password" type="password" class="mx-input" placeholder="Mínimo 8 caracteres" autocomplete="new-password" style="padding-right:42px;">
              <button type="button" id="u-toggle-eye" style="position:absolute;right:0;top:0;bottom:0;width:42px;background:none;border:none;color:#64748b;cursor:pointer;font-size:15px;">
                <i class="bi bi-eye" id="u-eye-icon"></i>
              </button>
            </div>
          </div>

          <div class="mx-form-grid">
            <div class="mx-field">
              <label class="mx-label">Rol</label>
              <select id="u-rol" class="mx-select">
                <option value="usuario">Usuario</option>
                <option value="admin">Administrador</option>
                <option value="lectura">Solo lectura</option>
              </select>
            </div>

            <div class="mx-field" style="justify-content:center; padding-top:20px;">
              <label class="checkbox-label" style="gap:10px; cursor:pointer; display:flex; align-items:center;">
                <input id="u-activo" type="checkbox" checked style="width:18px; height:18px; margin:0;">
                <span style="font-size:13px; font-weight:700; color:var(--color-text);">Activo</span>
              </label>
            </div>
          </div>

          <div id="u-error" style="display:none;">
            <div class="mx-alert mx-alert-danger">
              <i class="bi bi-exclamation-triangle-fill mx-alert-icon"></i>
              <div class="mx-alert-content" id="u-error-msg"></div>
            </div>
          </div>
        </form>
      </div>
      <div class="mx-modal-foot">
        <button type="button" class="mx-btn mx-btn-outline js-usr-close">Cancelar</button>
        <button type="button" id="u-guardar" class="mx-btn mx-btn-primary write-only">
          <i class="bi bi-check-lg"></i> Guardar
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/usuarios/index.js"></script>
  <script type="module" src="/js/components/Sidebar.js"></script>

  <script>
    const mo = document.getElementById('modalUsuario');
    mo.addEventListener('click', (e) => {
      if (e.target === mo) {
        mo.style.display = 'none';
        mo.classList.remove('open');
      }
    });
  </script>
</body>
</html>
