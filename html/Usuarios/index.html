<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Usuarios — AppMMPP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/index-modern.css">
  <link rel="stylesheet" href="/css/base-ui.css">
  <link rel="stylesheet" href="/css/maestros.css">
  <link rel="stylesheet" href="/css/modals-modern.css">
  <script src="/js/auth.js"></script>
  <style>
    .usr-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .usr-badge-admin   { background: rgba(99,102,241,.15); color: #818cf8; }
    .usr-badge-usuario { background: rgba(20,184,166,.13); color: #2dd4bf; }
    .usr-badge-lectura { background: rgba(100,116,139,.15); color: #94a3b8; }
    .usr-badge-activo  { background: rgba(34,197,94,.12);  color: #4ade80; }
    .usr-badge-inactivo{ background: rgba(239,68,68,.12);  color: #f87171; }
    .usr-initials {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg,#0f766e,#14b8a6);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .usr-name-cell { display: flex; align-items: center; gap: 10px; }
    .usr-name-cell .usr-name  { font-weight: 600; color: #e2e8f0; font-size: 13px; }
    .usr-name-cell .usr-email { font-size: 11px; color: #64748b; }
    .usr-empty {
      text-align: center; padding: 48px 0; color: #475569;
    }
    .usr-empty i { font-size: 40px; display: block; margin-bottom: 10px; }
  </style>
</head>
<body class="app-modern-v2">
  <div class="layout">
    <div id="sidebar-container"></div>
    <main class="content">
      <div class="maest-shell">

        <div class="maest-hero">
          <h4><i class="bi bi-people" style="color:#4f46e5;"></i> Usuarios</h4>
          <p>Gestiona los usuarios del sistema. Solo los administradores pueden crear y modificar usuarios.</p>
        </div>

        <div class="maest-panel active" style="margin-top:0;">
          <div class="maest-panel-head">
            <h6 id="usr-count">Usuarios</h6>
            <button class="am-btn am-btn-primary write-only" id="btnNuevoUsuario">
              <i class="bi bi-person-plus"></i> Nuevo usuario
            </button>
          </div>
          <div class="maest-table-wrap">
            <table class="maest-table" id="tbl-usuarios">
              <thead>
                <tr>
                  <th>Usuario</th>
                  <th>Rol</th>
                  <th>Estado</th>
                  <th>Último acceso</th>
                  <th style="text-align:right;">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbody-usuarios">
                <tr><td colspan="5" class="usr-empty"><i class="bi bi-hourglass-split"></i>Cargando…</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Modal Usuario -->
  <div id="modalUsuario" class="modal app-modal-modern" style="width:460px !important;">
    <div class="app-modal-header">
      <div class="app-modal-header-top">
        <h5 id="modalUsuarioTitle">Nuevo usuario</h5>
        <button type="button" class="js-usr-close" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:20px;">&times;</button>
      </div>
    </div>
    <div class="app-modal-body">
      <div class="am-form-grid">

        <div class="am-input-group col-12">
          <label class="am-label">Nombre completo <span style="color:#ef4444;">*</span></label>
          <input id="u-nombre" type="text" class="am-input" placeholder="Ej: María González" autocomplete="off">
        </div>

        <div class="am-input-group col-12" id="u-email-row">
          <label class="am-label">Correo electrónico <span style="color:#ef4444;">*</span></label>
          <input id="u-email" type="email" class="am-input" placeholder="usuario@empresa.com" autocomplete="off">
        </div>

        <div class="am-input-group col-12" id="u-password-row">
          <label class="am-label">Contraseña <span style="color:#ef4444;">*</span></label>
          <div style="position:relative;">
            <input id="u-password" type="password" class="am-input" placeholder="Mínimo 8 caracteres" autocomplete="new-password" style="padding-right:42px;">
            <button type="button" id="u-toggle-eye" style="position:absolute;right:0;top:0;bottom:0;width:42px;background:none;border:none;color:#64748b;cursor:pointer;font-size:15px;">
              <i class="bi bi-eye" id="u-eye-icon"></i>
            </button>
          </div>
        </div>

        <div class="am-input-group col-6">
          <label class="am-label">Rol</label>
          <select id="u-rol" class="am-select browser-default">
            <option value="usuario">Usuario</option>
            <option value="admin">Administrador</option>
            <option value="lectura">Solo lectura</option>
          </select>
        </div>

        <div class="am-input-group col-6" style="justify-content:flex-end;padding-top:24px;">
          <label class="checkbox-label" style="gap:8px;cursor:pointer;">
            <input id="u-activo" type="checkbox" checked style="width:18px;height:18px;margin:0;cursor:pointer;">
            <span style="font-size:13px;font-weight:700;color:#334155;">Activo</span>
          </label>
        </div>

        <div id="u-error" style="display:none;" class="col-12">
          <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:10px 14px;font-size:12px;color:#fca5a5;display:flex;gap:8px;align-items:center;">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span id="u-error-msg"></span>
          </div>
        </div>

      </div>
    </div>
    <div class="app-modal-footer">
      <button type="button" class="am-btn am-btn-flat js-usr-close">Cancelar</button>
      <button type="button" id="u-guardar" class="am-btn am-btn-primary write-only">
        <i class="bi bi-check-lg"></i> Guardar
      </button>
    </div>
  </div>
  <div id="modalUsuarioOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;"></div>

  <script type="module" src="/js/usuarios/index.js"></script>
  <script type="module" src="/js/components/Sidebar.js"></script>

  <script>
    const mo = document.getElementById('modalUsuario');
    const ov = document.getElementById('modalUsuarioOverlay');
    new MutationObserver(() => {
      ov.style.display = mo.classList.contains('open') ? 'block' : 'none';
    }).observe(mo, { attributes: true, attributeFilter: ['class'] });
    ov.addEventListener('click', () => mo.classList.remove('open'));
  </script>
</body>
</html>
